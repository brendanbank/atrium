<?xml version="1.0" encoding="UTF-8"?>
<!--
  Atrium wordmark — mark + name lockup.

  Layout: 64x64 mark on the left, then the word "Atrium" in a
  system humanist sans. Both use currentColor so a single CSS
  color drives the entire lockup.

  The font-family is a system stack reference, no embedded
  font data. Letter-spacing kept slightly open to echo the
  architectural / calm feel of the mark.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 240 64"
  width="240"
  height="64"
  fill="none"
  role="img"
  aria-label="Atrium"
>
  <!-- ===== Mark: same construction as logo.svg, anchored
       inside the leftmost 64x64 cell. ===== -->
  <g
    stroke="currentColor"
    stroke-linecap="square"
    stroke-linejoin="miter"
  >
    <!-- Outer frame -->
    <rect
      x="6"
      y="6"
      width="52"
      height="52"
      rx="2"
      ry="2"
      stroke-width="4"
    />
    <!-- Inner courtyard -->
    <rect
      x="18"
      y="18"
      width="28"
      height="28"
      stroke-width="2.5"
    />
    <!-- Lintel -->
    <line
      x1="18"
      y1="26"
      x2="46"
      y2="26"
      stroke-width="2.5"
    />
  </g>

  <!-- ===== Wordmark: "Atrium" set vertically centered on the
       64-tall canvas, with a comfortable gap from the mark. -->
  <text
    x="80"
    y="32"
    fill="currentColor"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="30"
    font-weight="500"
    letter-spacing="1.5"
    dominant-baseline="central"
  >Atrium</text>
</svg>
