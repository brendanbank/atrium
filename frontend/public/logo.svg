<?xml version="1.0" encoding="UTF-8"?>
<!--
  Atrium mark — "frame & void"

  An outer square frame (the building) wrapping an inset open
  square (the courtyard / atrium). A single horizontal lintel
  band crosses the upper portion of the void, suggesting the
  threshold — a beam against the open sky.

  Monochrome via currentColor so the surrounding Mantine theme
  controls the hue. Stroke widths chosen to survive 16x16
  rendering: outer frame is the dominant shape, inner detail
  stays minimal.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  width="64"
  height="64"
  fill="none"
  stroke="currentColor"
  stroke-linecap="square"
  stroke-linejoin="miter"
  role="img"
  aria-label="Atrium"
>
  <!-- Outer frame: the enclosing structure. Rounded just enough
       to feel intentional, not blobby. -->
  <rect
    x="6"
    y="6"
    width="52"
    height="52"
    rx="2"
    ry="2"
    stroke-width="4"
  />

  <!-- Inner courtyard: the open void. Drawn with a thinner
       stroke so the "frame around an opening" hierarchy is
       legible at small sizes. -->
  <rect
    x="18"
    y="18"
    width="28"
    height="28"
    stroke-width="2.5"
  />

  <!-- Lintel: a single horizontal beam crossing the upper
       third of the courtyard. Reads as a threshold / colonnade
       cap; gives the mark its distinctive silhouette. -->
  <line
    x1="18"
    y1="26"
    x2="46"
    y2="26"
    stroke-width="2.5"
  />
</svg>
