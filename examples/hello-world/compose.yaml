# Hello World example — self-contained prod compose.
#
# Pulls atrium from GHCR, builds the host extension on top, brings up
# api + worker + mysql. No proxy, no TLS — atrium speaks plain HTTP on
# :8000 by design. Put your own TLS terminator (Caddy, nginx, the
# load balancer at your edge) in front for production.
#
# Usage (from this directory):
#   cp .env.example .env  # fill in JWT_SECRET, DB password
#   docker compose up -d
#   docker compose exec api alembic upgrade head
#   docker compose exec api alembic -c /opt/host_app/alembic.ini upgrade head
#   docker compose exec api python -m app.scripts.seed_admin \
#       --email admin@example.com --password 'secret' \
#       --full-name 'Admin' --super-admin
#   docker compose exec api python -m atrium_hello_world.scripts.seed_host_bundle /host/main.js
#   open http://localhost:8000
#
# For dev (hot-reload, vite, smoke variants), see ./dev/.
#
# Environment variables are pulled from the compose project's .env via
# ${VAR} interpolation (compose auto-loads .env from this directory)
# or from --env-file on the command line. We avoid the ``env_file:``
# service directive so that --env-file alone is enough for both
# variable substitution and container env — no real .env needs to
# exist on disk for smoke / CI use.

services:
  api:
    build:
      # Repo root, so the Dockerfile's COPY can reach examples/hello-world/
      # backend/ and frontend/ in one tree.
      context: ../..
      dockerfile: examples/hello-world/Dockerfile
      args:
        ATRIUM_IMAGE: ${ATRIUM_IMAGE:-ghcr.io/brendanbank/atrium:latest}
    image: atrium-hello-world:latest
    pull_policy: never
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-Atrium Hello World}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://localhost:8000}
      MAIL_BACKEND: ${MAIL_BACKEND:-console}
      MAIL_FROM: ${MAIL_FROM:-no-reply@example.com}
      ATRIUM_HOST_MODULE: atrium_hello_world.bootstrap
      HELLO_TICK_SECONDS: ${HELLO_TICK_SECONDS:-30}
      # Host alembic runs with cwd=/opt/host_app (via -c /opt/host_app/alembic.ini)
      # and its env.py imports from atrium's `app` package. The runtime
      # image installs atrium's source at /app, so put it on PYTHONPATH
      # so the import resolves no matter where the caller's cwd is.
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  worker:
    image: atrium-hello-world:latest
    pull_policy: never
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_BACKEND: ${MAIL_BACKEND:-console}
      MAIL_FROM: ${MAIL_FROM:-no-reply@example.com}
      ATRIUM_HOST_MODULE: atrium_hello_world.bootstrap
      HELLO_TICK_SECONDS: ${HELLO_TICK_SECONDS:-30}
      PYTHONPATH: /app
    command: ["python", "-m", "app.worker"]
    depends_on:
      mysql:
        condition: service_healthy
      # The api service builds the shared atrium-hello-world image —
      # this dependency makes ``up -d`` build it once before the worker
      # tries to pull-or-fail.
      api:
        condition: service_started
    healthcheck:
      disable: true

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+00:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
    name: hello_world_mysql_data
