# nginx config for the host-bundle sidecar.
#
# Serves the prebuilt host bundle on its own origin so the SPA's
# dynamic import doesn't pass through Vite's dev server (which would
# rewrite the request with ``?import`` and try to transform the
# bundle as if it were source). CORS is wide open — the bundle is
# public-by-design and the SPA fetches it cross-origin.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;

    # Match the `Access-Control-Allow-Origin: *` policy that B1's
    # frontend slot loader expects when host_bundle_url points at a
    # different origin. Without these headers the browser refuses to
    # execute the imported module.
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;
    # The dynamic import uses the bundle's MIME type to decide if the
    # response is a JS module; nginx-alpine sets text/javascript by
    # default for .js but be explicit so future bundle formats stay
    # compatible.
    types {
        text/javascript    js mjs;
        application/json   map;
    }

    location / {
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
