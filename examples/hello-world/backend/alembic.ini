# Host-side alembic config for the Hello World example.
#
# Atrium owns its own chain in backend/alembic (version table:
# alembic_version). The host owns this independent chain in
# alembic_version_app — see env.py. Run with:
#
#   alembic -c examples/hello-world/backend/alembic.ini upgrade head
#
# Inside the container the example's compose mounts this dir at
# /host_app, so the command becomes:
#
#   alembic -c /host_app/alembic.ini upgrade head

[alembic]
# %(here)s resolves to the directory of this ini file. Without it,
# script_location is interpreted relative to the CWD, which means
# `alembic -c /host_app/alembic.ini ...` run from /app would load
# /app/alembic (atrium's chain) instead of the host's.
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/src
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
