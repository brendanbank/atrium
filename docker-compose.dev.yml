# Dev overrides. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# - Backend runs uvicorn with --reload, source bind-mounted
# - Frontend (Vite dev server with HMR) is added back as the `web`
#   service — the prod compose has no separate web container because
#   atrium serves the built SPA from the api process, but for dev we
#   keep Vite for hot-module-reload while editing the React tree.
# - MySQL exposed on 127.0.0.1:3306

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      APP_BASE_URL: http://localhost:5173

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./backend:/app

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    command: ["pnpm", "dev", "--host", "0.0.0.0", "--port", "5173"]
    volumes:
      - ./frontend:/app
      # Named volume keeps node_modules out of the bind mount. Remove
      # with `docker compose down -v` to force a reinstall after
      # package.json changes.
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    networks:
      - edge

  mysql:
    ports:
      - "127.0.0.1:3306:3306"

volumes:
  frontend_node_modules:
    name: atrium_frontend_node_modules
