# TLS termination for the edge Caddy on the firewall.
#
# Caddy terminates the public TLS and then reverse-proxies over the
# private link to this container on :443. We terminate TLS again here
# so the hop between firewall and VM is encrypted, then dumb-proxy to
# the api container — atrium serves both /api/* JSON routes and the
# SPA from one origin since the backend + frontend images were merged.

server {
    listen 80 default_server;
    server_name _;
    # Edge Caddy talks to 443 directly; anything hitting 80 gets bounced.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    # Mozilla Intermediate profile (as of 2025). Drops RSA key-exchange
    # and CBC-only ciphersuites, keeps broad client compatibility.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_tickets off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Defense-in-depth headers. Served on every response from this
    # vhost (SPA, API, errors). 'unsafe-inline' on style-src is required
    # because Mantine emits inline <style> tags at runtime; everything
    # else is same-origin.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Trust the edge Caddy's X-Forwarded-For so logs show the real
    # client IP, not the docker bridge gateway. Cover the RFC1918
    # ranges — tighten if you want to only trust a specific Caddy IP.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # Docker's embedded DNS. Using a variable in proxy_pass forces
    # nginx to resolve at request time instead of config-load time,
    # so the proxy survives an api restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- Catch-all → api (which serves both /api routes and the SPA) ---
    # Single upstream now that the backend + frontend images are
    # merged. /notifications/stream is SSE — the proxy_buffering off
    # + proxy_read_timeout 24h settings let it keep the connection
    # open without nginx buffering frames.
    location / {
        set $upstream_api http://api:8000;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Connection        "";

        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  24h;
    }
}
