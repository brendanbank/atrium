# CI e2e override. Pairs with docker-compose.yml + docker-compose.dev.yml.
#
# Reverts api/worker back to the prod ``runtime`` target (the dev
# override switched them to ``dev`` for hot-reload). Runtime bakes the
# built SPA into /opt/atrium/static so the api container serves it
# from the same process — there is no separate web container in this
# topology, so Playwright points at http://localhost:8000 for both
# the SPA and the API surface.

services:
  api:
    build:
      target: runtime
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    # No bind mount — we want the runtime image's baked-in source +
    # /opt/atrium/static, not the host tree.
    volumes: !override []
    environment: !override
      APP_BASE_URL: http://localhost:8000
      # The browser hits the api directly at :8000 in the e2e topology
      # (no separate web container, no proxy). WebAuthn signs the
      # origin into the registration response, so the backend must
      # verify against the same origin or every register/finish 400s.
      WEBAUTHN_ORIGIN: http://localhost:8000

  worker:
    build:
      target: runtime
    command: !override ["python", "-m", "app.worker"]
    volumes: !override []
    environment: !override {}

  # The dev overlay's web service (Vite dev server) is irrelevant here
  # — the api container serves the SPA in this topology. Profile it
  # out so ``up -d`` doesn't start it.
  web:
    profiles: ["never"]
