# CI e2e override. Pairs with docker-compose.yml + docker-compose.dev.yml.
#
# The dev override runs the frontend as a vite dev server with a
# bind-mounted source tree and a named node_modules volume. That setup
# is handy locally but fragile on ephemeral CI runners (volume
# re-init + pnpm virtual store races cause missing-file errors from
# postcss). For e2e we want something closer to production anyway, so
# here we swap the web service to the prod nginx target with the API
# URL baked in for the CI host.
services:
  web:
    build:
      context: ./frontend
      target: runtime
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_DEFAULT_LANGUAGE: en
    # Drop the dev-mode command; nginx-unprivileged runs nginx by default.
    command: null
    # No bind mount, no node_modules volume — static dist only.
    volumes: !override []
    ports: !override
      - "127.0.0.1:5173:8080"
    environment: !override {}
