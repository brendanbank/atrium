name: Publish image

# Strictly tag-driven publishing to GHCR. No `master` push trigger; no
# `edge` or per-commit images. Tag from a green master — `ci.yml`
# already covers PR validation, and gating publish on `needs:` would
# mean re-running every PR check on the tagged commit (wasted work
# when it already passed).
#
# `workflow_dispatch` lets a maintainer re-run an existing tag (eg.
# registry outage recovery) without retagging.
#
# Per-arch parallel builds: amd64 on ubuntu-24.04, arm64 on
# ubuntu-24.04-arm. Each matrix job pushes its image by digest only
# (no tags); the merge job assembles the multi-arch manifest list
# under the canonical semver tags. This replaces the previous
# unified single-runner build that emulated arm64 via qemu — the
# emulation was the dominant cost (8 min for a typical release).
# Native arm64 runners are free for private repos on the Team plan;
# if the runner ever becomes unavailable, swap matrix.runner.arm64
# back to ubuntu-24.04 and re-add docker/setup-qemu-action to fall
# back to emulation.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to (re-)publish (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# IMAGE_NAME is computed per-job from ``github.repository_owner``
# lowercased. The owner login can contain uppercase characters
# (e.g. ``brendanbank``) but GHCR refs are case-sensitive and reject
# anything that isn't all-lowercase. ``docker/metadata-action`` is
# tolerant — it normalises internally — but the per-arch refactor
# also feeds the name straight into ``build-push-action``'s
# ``outputs:`` ref and the merge step's ``printf``, neither of which
# normalise. Computing once into ``$GITHUB_ENV`` keeps every later
# reference consistent and avoids stamping a mixed-case ref into the
# push.

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Resolve image name + platform pair
        # buildx artifact names can't contain slashes; turn linux/amd64
        # into linux-amd64 for the digest artifact name + cache scope.
        # ``${var,,}`` is bash's lowercase parameter expansion.
        run: |
          owner="${{ github.repository_owner }}"
          echo "IMAGE_NAME=ghcr.io/${owner,,}/atrium" >> "$GITHUB_ENV"
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Regression guard for issue #91: v0.19.0 shipped with the SPA
      # bundle built from VITE_API_BASE_URL="" because the build-args
      # block above silently overrode the Dockerfile default. The
      # backend moved to /api/* in v0.19.0 but the published bundle
      # still called un-prefixed paths, so every API call fell
      # through to the SPA fallback and returned index.html.
      #
      # Build the frontend stage to a local dir and grep — fails
      # the publish job before the digest push if the prefix is
      # missing. Runs on amd64 only because the SPA bundle is
      # platform-agnostic JavaScript; doing it twice would just
      # double the cost.
      - name: Verify SPA bundle bakes /api prefix
        if: matrix.platform == 'linux/amd64'
        run: |
          docker buildx build \
            --target frontend-builder \
            --build-arg VITE_API_BASE_URL=/api \
            --output type=local,dest=/tmp/spa-check \
            --cache-from type=gha,scope=runtime-${{ env.PLATFORM_PAIR }} \
            .
          bundle=$(ls /tmp/spa-check/dist/assets/index-*.js | head -1)
          if ! grep -q '/api' "$bundle"; then
            echo "::error::SPA bundle does not contain /api — VITE_API_BASE_URL build arg lost (issue #91)" >&2
            exit 1
          fi
          echo "SPA bundle contains /api prefix ($(basename "$bundle"))"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: Dockerfile
          target: runtime
          platforms: ${{ matrix.platform }}
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_DEFAULT_LANGUAGE=en
          # No tags here — push-by-digest is what lets the merge job
          # below assemble the multi-arch manifest list under the
          # real semver tags.
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=runtime-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=runtime-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4.6.2
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve image name
        run: |
          owner="${{ github.repository_owner }}"
          echo "IMAGE_NAME=ghcr.io/${owner,,}/atrium" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          # ``type=semver`` defaults to extracting from ``github.ref``,
          # which is correct for the ``on: push: tags`` path
          # (``refs/tags/v1.2.3``) but wrong for ``workflow_dispatch``
          # — that always runs against the workflow file's branch
          # (``refs/heads/master``), and the dispatch ``ref`` input is
          # carried separately in ``github.event.inputs.ref``. Without
          # an explicit ``value=`` override, a manual re-publish drops
          # every semver tag and only ``type=raw,value=latest`` lands,
          # which is what bit the v0.11.2 re-dispatch. Plumbing the
          # input through (with ``github.ref_name`` as the push-trigger
          # fallback) keeps both paths emitting the full tag set.
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.ref || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.ref || github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.event.inputs.ref || github.ref_name }}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        # `imagetools create` accepts repeated -t flags for tags and
        # one or more @sha256:... source refs; jq pulls the tag list
        # straight out of metadata-action's JSON output. Word
        # splitting on the two $(...) substitutions is intentional —
        # each tag and each digest must arrive as its own argv slot.
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE_NAME}@sha256:%s " *)

      - name: Inspect image
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.meta.outputs.version }}"
