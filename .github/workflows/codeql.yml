name: CodeQL

# CodeQL analysis on every PR, a weekly scheduled scan, and on
# demand. Requires GitHub Advanced Security on private repos —
# included with the GitHub Team plan the repo is on.

on:
  pull_request:
    branches: [master]
    # Doc-only PRs skip CodeQL — no Python or TS source changed, the
    # weekly cron and on-demand dispatch still cover full scans.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENCE.md"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          # ``actions`` re-uses the CodeQL pipeline to lint workflow
          # files (missing GITHUB_TOKEN permissions, untrusted inputs
          # in run blocks, etc.). Cheap, no build step.
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # The query set (security-and-quality), the paths-ignore for
          # alembic + tests, and the py/unused-global-variable filter
          # all live in the repo-local config so this workflow stays
          # focused on driving the matrix.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          category: "/language:${{ matrix.language }}"
