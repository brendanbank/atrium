name: CI

on:
  pull_request:
    # Doc-only PRs skip CI entirely. The filter triggers when *every*
    # changed file matches one of these patterns; mixed PRs (any code
    # file alongside docs) still run the full suite. Mirrors codeql.yml
    # and security.yml so a doc-only PR is genuinely free.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENCE.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default-minimal token. Each job only reads the checkout; nothing
# writes back to the repo. Locks down GITHUB_TOKEN at the workflow
# scope so a future job inherits the safe default.
permissions:
  contents: read

jobs:
  # Backend pytest is sharded for parallel CI. ``backend-core`` runs
  # unit + integration + healthz (~41 tests) and ruff. ``backend-api``
  # runs the HTTP / fastapi-users flows (~154 tests) split across an
  # N-way pytest-split matrix that auto-balances by stored test
  # durations (``backend/.test_durations``). All shards use the same
  # MySQL service and the same conftest — the session-scoped
  # ``run_migrations`` autouse fixture means even unit tests need a
  # live database, so we don't skip the service on any shard.
  #
  # Refresh the durations file when the suite drifts: from
  # ``backend/`` run ``uv run pytest tests/api --store-durations`` and
  # commit the result. pytest-split falls back to count-based
  # splitting if the file is missing or stale, so a stale checkin
  # degrades gracefully rather than failing CI.
  backend-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: casa_test
          MYSQL_USER: casa
          MYSQL_PASSWORD: casa
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Sync deps
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest (unit + integration + healthz)
        env:
          DATABASE_URL: mysql+aiomysql://casa:casa@127.0.0.1:3306/casa_test
          APP_SECRET_KEY: test-secret
          JWT_SECRET: test-secret
        run: uv run pytest tests/unit tests/integration tests/test_healthz.py --cov=app --cov-report=term-missing

  backend-api:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 2-way split today. Bumping to N requires updating ``splits``
        # everywhere ``--splits`` appears below; ``group`` is whatever
        # 1..N range matches.
        group: [1, 2]
    name: backend-api (${{ matrix.group }}/2)
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: casa_test
          MYSQL_USER: casa
          MYSQL_PASSWORD: casa
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Sync deps
        run: uv sync

      - name: Pytest (api, group ${{ matrix.group }}/2)
        env:
          DATABASE_URL: mysql+aiomysql://casa:casa@127.0.0.1:3306/casa_test
          APP_SECRET_KEY: test-secret
          JWT_SECRET: test-secret
        # ``--splits 2 --group N`` is pytest-split's contract: each
        # shard skips the ~half of tests it doesn't own. Coverage is
        # per-shard (no combine step) — ``--cov-fail-under`` would
        # need the combine, and we're not enforcing a threshold.
        run: uv run pytest tests/api --splits 2 --group ${{ matrix.group }} --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          version: 10.33.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # `--ignore-workspace` because the repo-root `pnpm-workspace.yaml`
      # covers the host SDK packages (`packages/*` +
      # `examples/hello-world/frontend`) but deliberately excludes
      # atrium's main SPA. Without the flag, pnpm walks up to the
      # workspace marker and skips installing into `frontend/`. See
      # `frontend/.npmrc` for the rationale.
      - name: Install deps
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  scaffolder:
    # Smoke-test the create-atrium-host scaffolder. Two passes:
    #   1. Unit tests via Node's built-in runner — covers the
    #      template substitution + name validation logic.
    #   2. Render the template into a temp dir non-interactively and
    #      check the structure (file count, no leftover __PLACEHOLDER__
    #      tokens, key files parse as JSON / TS).
    #
    # The emitted repo's `make test` is NOT runnable here because it
    # depends on the `@brendan-bank/atrium-*` packages being published
    # at the version the template pins. That happens at release time;
    # post-publish the same scaffolder is exercised manually as part
    # of the release ritual (RELEASING.md step 1.5+).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          version: 10.33.1

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Scaffolder unit tests
        working-directory: packages/create-atrium-host
        run: node --test test/names.test.js test/render.test.js

      - name: Render a host non-interactively
        run: |
          rm -rf /tmp/scaffold-out
          node packages/create-atrium-host/bin/index.js casa-del-leone \
            --yes-defaults --no-git --out /tmp/scaffold-out

      - name: Verify emitted structure
        run: |
          set -e
          test -f /tmp/scaffold-out/Dockerfile
          test -f /tmp/scaffold-out/compose.yaml
          test -f /tmp/scaffold-out/Makefile
          test -f /tmp/scaffold-out/backend/pyproject.toml
          test -f /tmp/scaffold-out/backend/alembic/versions/0001_init.py
          test -f /tmp/scaffold-out/backend/src/casa_del_leone/bootstrap.py
          test -f /tmp/scaffold-out/backend/src/casa_del_leone/router.py
          test -f /tmp/scaffold-out/backend/src/casa_del_leone/models.py
          test -f /tmp/scaffold-out/frontend/package.json
          test -f /tmp/scaffold-out/frontend/src/main.tsx
          test -f /tmp/scaffold-out/frontend/src/CasaDelLeoneWidget.tsx
          test -f /tmp/scaffold-out/frontend/src/test/CasaDelLeoneWidget.test.tsx
          test -f /tmp/scaffold-out/.github/workflows/ci.yml
          # Verify package.json parses cleanly.
          node -e "require('/tmp/scaffold-out/frontend/package.json')"
          # No leftover scaffolder placeholders. Atrium's own globals
          # (e.g. __ATRIUM_REGISTRY__) are not in this set so they
          # don't trip the check.
          ! grep -rE '__(HOST_NAME|HOST_PKG|BRAND_NAME|BRAND_PASCAL|BRAND_PRIMARY|ATRIUM_VERSION)__' /tmp/scaffold-out

  e2e:
    # Smoke-only: spin up the full stack with compose and run the four
    # golden-path Playwright specs (smoke project) to prove the app
    # boots end-to-end. Heavier flows stay at the API and unit-test
    # layer; the extended Playwright project runs locally only.
    #
    # The unified atrium image serves the SPA via Starlette StaticFiles
    # from the same process as the API, so Playwright points at
    # localhost:8000 for both the SPA load and the API surface — no
    # separate web container, no /api rewrite.
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: http://localhost:8000
      E2E_API_URL: http://localhost:8000
      E2E_ADMIN_EMAIL: admin@example.com
      E2E_ADMIN_PASSWORD: smoke-pw-12345
      # Fixed TOTP secret so Playwright can compute valid codes
      # against the pre-enrolled smoke admin (mirrors Makefile).
      E2E_ADMIN_TOTP_SECRET: JBSWY3DPEHPK3PXPJBSWY3DPEHPK3PXP
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          version: 10.33.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Prepare .env
        run: cp .env.example .env

      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/readyz > /dev/null; then exit 0; fi
            sleep 3
          done
          echo "API did not become ready" >&2
          docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml logs api
          exit 1

      - name: Run migrations
        run: make migrate

      - name: Seed admin
        # Pre-enroll TOTP on the smoke admin via ``exec`` (the api
        # container is already running from "Start stack") rather
        # than ``run --rm`` which cold-starts a fresh container per
        # call. Calling seed_admin directly (not via the make
        # wrapper) because the wrapper doesn't thread
        # --totp-secret through.
        #
        # The email-OTP admin is no longer seeded on PR CI — the
        # email-otp.spec lives in the extended Playwright project,
        # which doesn't run here. ``make smoke-extended`` re-seeds
        # it locally when needed.
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml exec -T api \
            python -m app.scripts.seed_admin \
              --email "$E2E_ADMIN_EMAIL" \
              --password "$E2E_ADMIN_PASSWORD" \
              --full-name 'Smoke Admin' \
              --super-admin \
              --totp-secret "$E2E_ADMIN_TOTP_SECRET"

      - name: Install frontend deps
        working-directory: frontend
        # See the `frontend` job for why `--ignore-workspace` is needed.
        run: pnpm install --frozen-lockfile --ignore-workspace

      # Cache the Chromium binary by Playwright version. ``ubuntu-latest``
      # already ships the system libs Chromium needs (libnss3, libgtk,
      # fontconfig, etc.) so ``--with-deps`` is not required — dropping
      # it skips the apt-get step that's the slower half of the install.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: pnpm exec playwright install chromium

      - name: Run Playwright smoke
        working-directory: frontend
        # ``--project=smoke`` runs only the four golden-path specs
        # defined in playwright.config.ts. The rest live under
        # ``--project=extended`` and are intentionally not gated on
        # PRs — backend pytest already covers the same flows. Run
        # them locally with ``make smoke-extended`` before risky
        # frontend changes.
        run: pnpm playwright test --project=smoke

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml logs

  hello-world-e2e:
    # Smoke for the Hello World example (examples/hello-world/) — proves
    # the published-image extension surface (ATRIUM_HOST_MODULE bootstrap,
    # the four frontend slot registries, the migration-form permission
    # seeder, the scheduler pipeline) actually works end-to-end.
    #
    # Uses the example's self-contained compose.yaml (atrium image +
    # host extension built locally on top, plain HTTP on :8000).
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: http://localhost:8000
      E2E_API_URL: http://localhost:8000
      E2E_ADMIN_EMAIL: admin@example.com
      E2E_ADMIN_PASSWORD: smoke-pw-12345
      E2E_ADMIN_TOTP_SECRET: JBSWY3DPEHPK3PXPJBSWY3DPEHPK3PXP
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          version: 10.33.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            examples/hello-world/frontend/pnpm-lock.yaml

      - name: Build atrium runtime image
        # Local atrium build instead of pulling from GHCR so PRs don't
        # depend on a published artifact for the branch under test.
        # Stays on raw ``docker build`` (not buildx/build-push-action)
        # because the next step is ``docker compose up --build`` which
        # references this image as ``FROM ${ATRIUM_IMAGE}`` in the
        # example's Dockerfile. Compose's active buildx builder must
        # be able to resolve that FROM against the docker daemon's
        # image store — a docker-container builder (what
        # ``setup-buildx-action`` activates by default) can't see
        # daemon-local tags and falls back to pulling from docker.io,
        # which fails with ``pull access denied``. The cache savings
        # would have been parallel to ``backend`` (not on the
        # critical path) so the trade isn't worth the breakage.
        run: docker build -t atrium-local:source --target runtime .

      - name: Prepare smoke .env
        # The example compose reads .env from examples/hello-world/.
        # Generate one with deterministic smoke values.
        run: |
          cat > examples/hello-world/.env <<'EOF'
          ENVIRONMENT=dev
          APP_TIMEZONE=UTC
          APP_SECRET_KEY=smoke-secret
          APP_BASE_URL=http://localhost:8000
          MYSQL_ROOT_PASSWORD=smoke-root-pw
          MYSQL_DATABASE=atrium
          MYSQL_USER=atrium
          MYSQL_PASSWORD=smoke-pw
          DATABASE_URL=mysql+aiomysql://atrium:smoke-pw@mysql:3306/atrium
          JWT_SECRET=smoke-jwt-secret
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES=10080
          WEBAUTHN_RP_ID=localhost
          WEBAUTHN_RP_NAME=Atrium Hello World
          WEBAUTHN_ORIGIN=http://localhost:8000
          MAIL_BACKEND=console
          MAIL_FROM=no-reply@example.com
          HELLO_TICK_SECONDS=2
          ATRIUM_IMAGE=atrium-local:source
          EOF

      - name: Start stack
        # The compose file is at examples/hello-world/compose.yaml; its
        # build.context is repo root. Invoking with -f from the repo
        # root keeps the build context correct.
        run: |
          docker compose -f examples/hello-world/compose.yaml \
            --env-file examples/hello-world/.env \
            up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/readyz > /dev/null; then exit 0; fi
            sleep 3
          done
          echo "API did not become ready" >&2
          docker compose -f examples/hello-world/compose.yaml logs api
          exit 1

      - name: Atrium migrations
        run: docker compose -f examples/hello-world/compose.yaml exec -T api alembic upgrade head

      - name: Host migrations
        run: docker compose -f examples/hello-world/compose.yaml exec -T api alembic -c /opt/host_app/alembic.ini upgrade head

      - name: Seed admin
        run: |
          docker compose -f examples/hello-world/compose.yaml exec -T api \
            python -m app.scripts.seed_admin \
              --email "$E2E_ADMIN_EMAIL" \
              --password "$E2E_ADMIN_PASSWORD" \
              --full-name 'Smoke Admin' \
              --super-admin \
              --totp-secret "$E2E_ADMIN_TOTP_SECRET"

      - name: Seed host_bundle_url
        run: |
          docker compose -f examples/hello-world/compose.yaml exec -T api \
            python -m atrium_hello_world.scripts.seed_host_bundle /host/main.js

      - name: Install host frontend deps
        working-directory: examples/hello-world/frontend
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: hello-playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('examples/hello-world/frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.hello-playwright-cache.outputs.cache-hit != 'true'
        working-directory: examples/hello-world/frontend
        run: pnpm exec playwright install chromium

      - name: Run Hello World smoke
        working-directory: examples/hello-world/frontend
        env:
          E2E_COMPOSE_FILES: '-f compose.yaml'
          E2E_COMPOSE_CWD: '..'
        run: pnpm exec playwright test

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f examples/hello-world/compose.yaml logs

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4.6.2
        with:
          name: hello-world-playwright-report
          path: |
            examples/hello-world/frontend/playwright-report
            examples/hello-world/frontend/test-results
          if-no-files-found: ignore
