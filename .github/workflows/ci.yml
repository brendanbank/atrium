name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: casa_test
          MYSQL_USER: casa
          MYSQL_PASSWORD: casa
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Sync deps
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        env:
          DATABASE_URL: mysql+aiomysql://casa:casa@127.0.0.1:3306/casa_test
          APP_SECRET_KEY: test-secret
          JWT_SECRET: test-secret
        run: uv run pytest --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          version: 10.33.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    # Smoke-only: spin up the full stack with compose and run the four
    # golden-path Playwright specs (smoke project) to prove the app
    # boots end-to-end. Heavier flows stay at the API and unit-test
    # layer; the extended Playwright project runs locally only.
    #
    # Runs in parallel with backend / frontend / compose-build —
    # nothing here consumes their artifacts. A red unit-test job
    # surfaces alongside a red e2e instead of after it; net wall-clock
    # win on green PRs is ~3 min.
    runs-on: ubuntu-latest
    env:
      E2E_ADMIN_EMAIL: admin@example.com
      E2E_ADMIN_PASSWORD: smoke-pw-12345
      # Fixed TOTP secret so Playwright can compute valid codes
      # against the pre-enrolled smoke admin (mirrors Makefile).
      E2E_ADMIN_TOTP_SECRET: JBSWY3DPEHPK3PXPJBSWY3DPEHPK3PXP
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          version: 10.33.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Prepare .env
        run: cp .env.example .env

      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/readyz > /dev/null; then exit 0; fi
            sleep 3
          done
          echo "API did not become ready" >&2
          docker compose -f docker-compose.yml -f docker-compose.dev.yml logs api
          exit 1

      - name: Run migrations
        run: make migrate

      - name: Seed admin
        # Pre-enroll TOTP on the smoke admin via ``exec`` (the api
        # container is already running from "Start stack") rather
        # than ``run --rm`` which cold-starts a fresh container per
        # call. Calling seed_admin directly (not via the make
        # wrapper) because the wrapper doesn't thread
        # --totp-secret through.
        #
        # The email-OTP admin is no longer seeded on PR CI — the
        # email-otp.spec lives in the extended Playwright project,
        # which doesn't run here. ``make smoke-extended`` re-seeds
        # it locally when needed.
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml exec -T api \
            python -m app.scripts.seed_admin \
              --email "$E2E_ADMIN_EMAIL" \
              --password "$E2E_ADMIN_PASSWORD" \
              --full-name 'Smoke Admin' \
              --super-admin \
              --totp-secret "$E2E_ADMIN_TOTP_SECRET"

      - name: Wait for frontend
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:5173/ > /dev/null; then exit 0; fi
            sleep 3
          done
          echo "Frontend did not become ready" >&2
          exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # Cache the Chromium binary by Playwright version. ``ubuntu-latest``
      # already ships the system libs Chromium needs (libnss3, libgtk,
      # fontconfig, etc.) so ``--with-deps`` is not required — dropping
      # it skips the apt-get step that's the slower half of the install.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: pnpm exec playwright install chromium

      - name: Run Playwright smoke
        working-directory: frontend
        # ``--project=smoke`` runs only the four golden-path specs
        # defined in playwright.config.ts. The rest live under
        # ``--project=extended`` and are intentionally not gated on
        # PRs — backend pytest already covers the same flows. Run
        # them locally with ``make smoke-extended`` before risky
        # frontend changes.
        run: pnpm playwright test --project=smoke

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml logs

  hello-world-e2e:
    # Smoke for the Hello World example (examples/hello-world/) — proves
    # the published-image extension surface (ATRIUM_HOST_MODULE bootstrap,
    # the four frontend slot registries, the migration-form permission
    # seeder, the scheduler pipeline) actually works end-to-end.
    #
    # Runs in parallel with the existing e2e job. They cover different
    # ground: ``e2e`` runs atrium with no host module; this one runs
    # atrium with the example wired in.
    # No needs: — runs in parallel with backend/frontend/e2e/compose-build,
    # same as the existing e2e job. Gating on backend/frontend would only
    # postpone the failure feedback on a red PR; on a green PR the
    # minutes are spent either way.
    runs-on: ubuntu-latest
    env:
      E2E_ADMIN_EMAIL: admin@example.com
      E2E_ADMIN_PASSWORD: smoke-pw-12345
      E2E_ADMIN_TOTP_SECRET: JBSWY3DPEHPK3PXPJBSWY3DPEHPK3PXP
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          version: 10.33.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            examples/hello-world/frontend/pnpm-lock.yaml

      - name: Prepare .env
        run: cp .env.example .env

      - name: Install host frontend deps + build bundle
        working-directory: examples/hello-world/frontend
        # VITE_API_BASE_URL aligns with what atrium's web container is
        # built with in this stack — the SPA fetches localhost:8000
        # directly (no /api proxy on either dev or e2e). The bundle's
        # api.ts defaults to /api which falls back to the SPA's
        # index.html via try_files and breaks the host-side fetches.
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build atrium-backend (runtime)
        run: docker build -t atrium-backend:latest --target runtime backend

      - name: Build atrium-hello-backend
        run: |
          docker build -t atrium-hello-backend:latest \
            --build-arg ATRIUM_BACKEND_IMAGE=atrium-backend:latest \
            -f examples/hello-world/backend/Dockerfile .

      - name: Start stack
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.dev.yml \
            -f docker-compose.e2e.yml \
            -f examples/hello-world/compose.yaml \
            -f examples/hello-world/compose.dev.yaml \
            -f examples/hello-world/compose.e2e.yaml \
            up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/readyz > /dev/null; then exit 0; fi
            sleep 3
          done
          echo "API did not become ready" >&2
          docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml logs api
          exit 1

      - name: Atrium migrations
        run: |
          docker compose \
            -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml \
            -f examples/hello-world/compose.yaml -f examples/hello-world/compose.dev.yaml -f examples/hello-world/compose.e2e.yaml \
            exec -T api alembic upgrade head

      - name: Host migrations
        run: |
          docker compose \
            -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml \
            -f examples/hello-world/compose.yaml -f examples/hello-world/compose.dev.yaml -f examples/hello-world/compose.e2e.yaml \
            exec -T api alembic -c /opt/host_app/alembic.ini upgrade head

      - name: Seed admin
        run: |
          docker compose \
            -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml \
            -f examples/hello-world/compose.yaml -f examples/hello-world/compose.dev.yaml -f examples/hello-world/compose.e2e.yaml \
            exec -T api python -m app.scripts.seed_admin \
              --email "$E2E_ADMIN_EMAIL" \
              --password "$E2E_ADMIN_PASSWORD" \
              --full-name 'Smoke Admin' \
              --super-admin \
              --totp-secret "$E2E_ADMIN_TOTP_SECRET"

      - name: Seed host_bundle_url
        run: |
          docker compose \
            -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml \
            -f examples/hello-world/compose.yaml -f examples/hello-world/compose.dev.yaml -f examples/hello-world/compose.e2e.yaml \
            exec -T api python -m atrium_hello_world.scripts.seed_host_bundle /host/main.js

      - name: Cache Playwright browsers
        id: hello-playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('examples/hello-world/frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.hello-playwright-cache.outputs.cache-hit != 'true'
        working-directory: examples/hello-world/frontend
        run: pnpm exec playwright install chromium

      - name: Run Hello World smoke
        working-directory: examples/hello-world/frontend
        env:
          E2E_COMPOSE_FILES: >-
            -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml
            -f examples/hello-world/compose.yaml -f examples/hello-world/compose.dev.yaml
            -f examples/hello-world/compose.e2e.yaml
        run: pnpm exec playwright test

      - name: Dump stack logs on failure
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.e2e.yml \
            -f examples/hello-world/compose.yaml -f examples/hello-world/compose.dev.yaml -f examples/hello-world/compose.e2e.yaml \
            logs

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4.6.2
        with:
          name: hello-world-playwright-report
          path: |
            examples/hello-world/frontend/playwright-report
            examples/hello-world/frontend/test-results
          if-no-files-found: ignore

  compose-build:
    # Builds the prod images for trivy scanning. No dependency on
    # backend / frontend test results — the scan is about CVEs in
    # the resulting images, orthogonal to whether tests pass. Runs
    # in parallel for faster overall CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Build prod images
        run: docker compose -f docker-compose.yml build

      # Trivy: filesystem scan catches dep CVEs (uv.lock, pnpm-lock.yaml),
      # Dockerfile / IaC misconfig, and committed secrets. --ignore-unfixed
      # avoids blocking on CVEs that have no upstream patch yet.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          skip-dirs: frontend/node_modules,backend/.venv

      # Image scans cover OS-package CVEs in the base images (python,
      # nginx:alpine) that Dependabot doesn't see. Worker shares the api
      # build target, so scanning api covers it.
      - name: Trivy image scan (api)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: image
          image-ref: atrium-api
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy image scan (web)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: image
          image-ref: atrium-web
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
